# 장 마감 후 하루 치 RSS + DART 메타를 Supabase에 적재 (스크립트는 별도 구현)
#
# 필수 GitHub Secrets:
#   SUPABASE_URL          예: https://xxxx.supabase.co
#   SUPABASE_SERVICE_ROLE  서비스 롤 키 (절대 공개 저장소·클라이언트에 넣지 말 것)
#   DART_API_KEY          https://opendart.fss.or.kr/ 에서 발급
#
# 스케줄: UTC 기준 (한국 15:30 이후에 맞추려면 계절에 따라 cron 조정)
#   예: UTC 07:00 ≈ KST 16:00 (일광절약 없을 때)

name: Daily ingest (RSS + DART)

on:
  schedule:
    - cron: "0 7 * * 1-5" # 평일 UTC 07:00 — 필요 시 분·시 조정
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub Actions: Node 20 기반 JS 액션 폐기 대비 (Node 24 러너와 정합)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          # KST 기준 “오늘” 경계용 (스크립트에서 사용)
          TZ: Asia/Seoul
        run: node scripts/ingest-daily.mjs
