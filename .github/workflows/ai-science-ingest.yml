# AI·과학 RSS → OpenAI 요약 → Supabase posts ( scripts/ingest-ai-science.mjs )
#
# 필수 GitHub Secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE
#   OPENAI_API_KEY
#
# 선택: OPENAI_MODEL (기본 gpt-4o-mini)
#
# 스케줄: 하루 1회 (UTC 07:00 — 한국은 16:00/15:00 등 계절에 따라 다름)

name: AI science RSS ingest

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI science ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          TZ: Asia/Seoul
        run: node scripts/ingest-ai-science.mjs
